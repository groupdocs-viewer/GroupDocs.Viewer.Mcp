name: Build Packages

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - '**/*.csproj'
      - 'src/Directory.Build.props'
      - 'build/**'
      - 'build.ps1'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build project
        run: dotnet build ./src/GroupDocs.Viewer.Mcp.sln --configuration Release
