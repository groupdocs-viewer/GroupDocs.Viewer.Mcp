name: Publish Docker Image

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish as Docker image tag (must match build/dependencies.props, e.g. 26.5.0)'
        required: true
        type: string

jobs:
  publish_docker:
    if: startsWith(github.ref, 'refs/tags/') || inputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Verify required secrets are configured
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=()
          [[ -z "$DOCKERHUB_USERNAME" ]] && missing+=("DOCKERHUB_USERNAME")
          [[ -z "$DOCKERHUB_TOKEN" ]] && missing+=("DOCKERHUB_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}. Configure under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "All required secrets present."

      - uses: actions/checkout@v4

      - name: Set image names
        id: images
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "ghcr=ghcr.io/${OWNER,,}/viewer-net-mcp" >> $GITHUB_OUTPUT
          echo "dockerhub=groupdocs/viewer-net-mcp" >> $GITHUB_OUTPUT

      - name: Resolve and validate version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' does not match YY.MM.N (e.g. 26.5.0)."
            exit 1
          fi

          EXPECTED=$(grep -oP '<GroupDocsViewerMcp>\K[^<]+' build/dependencies.props | head -1)
          if [[ "$EXPECTED" != "$VERSION" ]]; then
            echo "::error::build/dependencies.props has <GroupDocsViewerMcp>$EXPECTED</...>, but release version is '$VERSION'."
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing Docker image for version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ steps.images.outputs.ghcr }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.ghcr }}:latest
            ${{ steps.images.outputs.dockerhub }}:${{ steps.version.outputs.version }}
            ${{ steps.images.outputs.dockerhub }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
